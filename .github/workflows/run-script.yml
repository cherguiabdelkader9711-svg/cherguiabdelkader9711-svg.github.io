name: Run Python Script Daily

on:
  schedule:
    # يتم تشغيل السكريبت تلقائياً كل يوم الساعة 12 منتصف الليل بتوقيت UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # يتيح لك تشغيله يدويأً متى شئت من زر Actions
 
jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

            - name: Run Downloader Script
        run: |
          python downloader.py

