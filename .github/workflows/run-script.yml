name: Run Python Downloader & Save Artifact

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Create and Run Downloader Script
        env:
          YOUTUBE_URL: '${{ github.event.inputs.video_url }}'
        run: |
          cat << 'EOF' > downloader.py
          import os
          from yt_dlp import YoutubeDL

          url = os.getenv('YOUTUBE_URL')
          if not url:
              print("Error: YOUTUBE_URL is not set")
              exit(1)

          print(f"Downloading: {url}")
          ydl_opts = {
              'format': 'best',
              'outtmpl': 'downloads/%(title)s.%(ext)s',
          }

          try:
              os.makedirs('downloads', exist_ok=True)
              with YoutubeDL(ydl_opts) as ydl:
                  info = ydl.extract_info(url, download=True)
                  print(f"Successfully downloaded: {info.get('title')}")
          except Exception as e:
              print(f"Error: Could not download video - {str(e)}")
              exit(1)
          EOF

          python downloader.py

      - name: Upload Downloaded Video
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/
