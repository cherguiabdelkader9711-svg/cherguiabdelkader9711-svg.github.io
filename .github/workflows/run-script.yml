name: Run Python Script Daily

on:
  schedule:
    # يتم تشغيل السكريبت تلقائياً كل يوم الساعة 12 منتصف الليل بتوقيت UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # تيح لك تشغيله يدوياً متى شئت من تبويب Actions

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run Downloader Script
        env:
          # يمكنك وضع رابط يوتيوب افتراضي هنا ليتم تحميله تلقائياً أثناء التشغيل السحابي
          YOUTUBE_URL: 'https://www.youtube.com/watch?v=BaW_jenozKc'
        run: |
          python downloader.py
