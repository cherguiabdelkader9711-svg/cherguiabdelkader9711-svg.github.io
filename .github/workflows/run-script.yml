name: Run Python Script Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Create and Run Downloader Script
        env:
          YOUTUBE_URL: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
        run: |
          # إنشاء ملف البايثون تلقائياً أثناء التشغيل لتجنب مشاكل الرفع
          cat << 'EOF' > downloader.py
          import os
          from yt_dlp import YoutubeDL

          url = os.getenv('YOUTUBE_URL')
          if not url:
              print("Error: YOUTUBE_URL is not set")
              exit(1)

          print(f"Downloading: {url}")
          ydl_opts = {
              'format': 'best',
              'outtmpl': '%(title)s.%(ext)s',
          }

          try:
              with YoutubeDL(ydl_opts) as ydl:
                  info = ydl.extract_info(url, download=True)
                  print(f"Successfully downloaded: {info.get('title')}")
          except Exception as e:
              print(f"Error: Could not download video - {str(e)}")
              exit(1)
          EOF

          # تشغيل السكربت فوراً
          python downloader.py
