<!DOCTYPE html>
<html lang="fr" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaFlow Pro - Téléchargeur YouTube Avancé</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     
    <style>
        :root {
            --transition-speed: 0.4s;
        }

        [data-theme="dark"] {
            --bg-color: #030712;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: rgba(17, 24, 39, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --neon-glow: rgba(59, 130, 246, 0.4);
            --input-bg: rgba(255, 255, 255, 0.03);
            --header-bg: rgba(3, 7, 18, 0.8);
            --modal-bg: rgba(17, 24, 39, 0.95);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 0, 0, 0.08);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --neon-glow: rgba(37, 99, 235, 0.3);
            --input-bg: rgba(0, 0, 0, 0.02);
            --header-bg: rgba(248, 250, 252, 0.8);
            --modal-bg: rgba(255, 255, 255, 0.98);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color var(--transition-speed), color var(--transition-speed), border-color var(--transition-speed);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        .ambient-glow {
            position: fixed;
            top: -20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 350px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--card-border);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.35rem;
            color: var(--primary);
            text-decoration: none;
            text-shadow: 0 0 20px var(--neon-glow);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            z-index: 2;
        }

        .hero-icon {
            font-size: 3.8rem;
            color: #ef4444;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 35px;
            max-width: 600px;
            line-height: 1.6;
        }

        .download-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15), 0 0 0 1px var(--card-border);
            display: flex;
            width: 100%;
            max-width: 650px;
            margin-bottom: 15px;
        }

        .download-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 18px;
            font-size: 1rem;
            color: var(--text-main);
            background: transparent;
        }

        .download-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 26px;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: left;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 14px;
        }

        .close-modal {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .download-btn-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            color: var(--text-main);
            width: 100%;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
        }

        .download-btn-option:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        footer {
            text-align: center;
            padding: 25px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
            background: var(--header-bg);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <header>
        <a href="#" class="logo" onclick="return false;">
            <i class="fa-solid fa-infinity"></i> MediaFlow Pro
        </a>
        <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>
    </header>

    <main>
        <div class="hero-icon">
            <i class="fa-brands fa-youtube"></i>
        </div>
        <h1>Téléchargeur de vidéos YouTube</h1>
        <p class="subtitle">Collez votre URL ci-dessous pour générer les liens de téléchargement instantanément.</p>

        <div class="download-box">
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
            <button onclick="openDownloadModal()">
                <i class="fa-solid fa-download"></i> Traiter le lien
            </button>
        </div>
    </main>

    <div class="modal-overlay" id="downloadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Options de Téléchargement</h3>
                <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="option-group" id="downloadOptionsContainer">
                <!-- سيتم توليد الروابط هنا تلقائياً -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MediaFlow Pro & Aek_tech - Tous droits réservés.</p>
    </footer>

    <script>
        const modal = document.getElementById('downloadModal');

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function openDownloadModal() {
            const url = document.getElementById('urlInput').value.trim();
            const videoID = extractVideoID(url);
            
            if(!videoID) {
                alert('Veuillez entrer une URL YouTube valide !');
                return;
            }

            const container = document.getElementById('downloadOptionsContainer');
            container.innerHTML = `
                <a href="https://www.youtube.com/watch?v=${videoID}" target="_blank" class="download-btn-option">
                    <span><i class="fa-solid fa-file-video"></i> Regarder / Télécharger (1080p)</span>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="https://loader.to/api/button/?url=${encodeURIComponent(url)}" target="_blank" class="download-btn-option">
                    <span><i class="fa-solid fa-download"></i> Format MP4 Direct</span>
                    <i class="fa-solid fa-download"></i>
                </a>
                <a href="https://loader.to/api/button/?url=${encodeURIComponent(url)}" target="_blank" class="download-btn-option">
                    <span><i class="fa-solid fa-music"></i> Format MP3 Audio</span>
                    <i class="fa-solid fa-download"></i>
                </a>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                icon.className = 'fa-solid fa-sun';
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'fa-solid fa-moon';
            }
        }
    </script>
</body>
</html>
