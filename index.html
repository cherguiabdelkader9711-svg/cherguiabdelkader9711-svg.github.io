<!DOCTYPE html>
<html lang="fr" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaFlow Pro1 - Téléchargeur YouTube Avancé</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     
    <style>
        :root {
            --transition-speed: 0.4s;
        }

        [data-theme="dark"] {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --card-bg: rgba(18, 18, 18, 0.85);
            --card-border: rgba(255, 255, 255, 0.12);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --neon-glow: rgba(59, 130, 246, 0.6);
            --input-bg: rgba(255, 255, 255, 0.05);
            --header-bg: rgba(5, 5, 5, 0.8);
            --modal-bg: rgba(15, 15, 15, 0.95);
        }

        [data-theme="light"] {
            --bg-color: #f0fdf4;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(34, 197, 94, 0.2);
            --primary: #10b981;
            --primary-hover: #059669;
            --neon-glow: rgba(16, 185, 129, 0.6);
            --input-bg: rgba(0, 0, 0, 0.03);
            --header-bg: rgba(255, 255, 255, 0.8);
            --modal-bg: rgba(255, 255, 255, 0.98);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color var(--transition-speed), color var(--transition-speed), border-color var(--transition-speed);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
            text-decoration: none;
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
            z-index: 2;
        }

        .hero-icon {
            font-size: 3.5rem;
            color: #ef4444;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 35px;
            max-width: 650px;
            line-height: 1.6;
        }

        .download-box {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 8px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            width: 100%;
            max-width: 680px;
            border: 1px solid var(--card-border);
            margin-bottom: 15px;
        }

        .download-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 18px;
            font-size: 1rem;
            color: var(--text-main);
            background: transparent;
        }

        .download-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 26px;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--card-border);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: left;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-group h4 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .download-btn-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 10px;
            color: var(--text-main);
            width: 100%;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .download-btn-option:hover {
            background: var(--primary);
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
            background: var(--header-bg);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <a href="#" class="logo" onclick="return false;">
            <i class="fa-solid fa-infinity"></i> MediaFlow Pro 1
        </a>
        <div class="nav-right">
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">
                <i class="fa-solid fa-moon" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <main>
        <div class="hero-icon">
            <i class="fa-brands fa-youtube"></i>
        </div>
        <h1>Téléchargeur de vidéos 2 YouTube</h1>
        <p class="subtitle">Collez votre URL ci-dessous pour lancer le traitement local via Python.</p>

        <div class="download-box">
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
            <button onclick="openDownloadModal()">
                <i class="fa-solid fa-download"></i> Traiter le lien
            </button>
        </div>
    </main>

    <div class="modal-overlay" id="downloadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Options de Traitement</h3>
                <button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="option-group">
                <button class="download-btn-option" onclick="startProcess('Vidéo 1080p')">
                    <span><i class="fa-solid fa-file-video"></i> Vidéo 1080p (MP4)</span>
                    <i class="fa-solid fa-download"></i>
                </button>
                <button class="download-btn-option" onclick="startProcess('Audio MP3')">
                    <span><i class="fa-solid fa-music"></i> Audio MP3</span>
                    <i class="fa-solid fa-download"></i>
                </button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 MediaFlow Pro &  1Aek_tech</p>
    </footer>

    <script>
        const modal = document.getElementById('downloadModal');

        function openDownloadModal() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) {
                alert('Veuillez entrer une URL valide !');
                return;
            }
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function startProcess(optionName) {
            const url = document.getElementById('urlInput').value.trim();
            closeModal();
            alert(`✅ Option sélectionnée : ${optionName}\n🔗 Lien : ${url}\n\nLe script Python (downloader.py) va traiter cette demande.`);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                icon.className = 'fa-solid fa-sun';
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'fa-solid fa-moon';
            }
        }
    </script>
</body>
</html>
