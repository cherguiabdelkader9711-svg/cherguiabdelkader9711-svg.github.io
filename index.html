<!DOCTYPE html>
<html lang="fr" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaFlow Pro - Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     
    <style>
        :root {
            --bg-color: #030712;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: rgba(17, 24, 39, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --input-bg: rgba(255, 255, 255, 0.03);
            --header-bg: rgba(3, 7, 18, 0.8);
            --modal-bg: rgba(17, 24, 39, 0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        header { width: 100%; background: var(--header-bg); border-bottom: 1px solid var(--card-border); padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.35rem; color: var(--primary); text-decoration: none; }
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; width: 100%; max-width: 700px; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
        p.subtitle { color: var(--text-muted); font-size: 1rem; margin-bottom: 30px; }
        .download-box { background: var(--card-bg); padding: 8px; border-radius: 16px; border: 1px solid var(--card-border); display: flex; width: 100%; margin-bottom: 20px; }
        .download-box input { flex: 1; border: none; outline: none; padding: 14px 18px; font-size: 1rem; color: var(--text-main); background: transparent; }
        .download-box button { background: var(--primary); color: white; border: none; padding: 0 26px; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .download-box button:hover { background: var(--primary-hover); }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--card-border); display: none; width: 100%; text-align: left; font-size: 0.95rem; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo"><i class="fa-solid fa-infinity"></i> MediaFlow Pro</a>
    </header>

    <main>
        <h1>Téléchargeur Intelligent (Python Powered)</h1>
        <p class="subtitle">قم بلصق رابط الفيديو أدناه ليتم معالجته عبر سكربت البايثون الخاص بك.</p>

        <div class="download-box">
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
            <button onclick="processDownload()"><i class="fa-solid fa-bolt"></i> تنفيذ المعالجة</button>
        </div>

        <div class="status-box" id="statusBox">
            <i class="fa-solid fa-circle-notch fa-spin"></i> <span id="statusText">جاري إرسال الطلب إلى السيرفر...</span>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Aek_tech - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        function processDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');

            if (!url) {
                alert('الرجاء إدخال رابط صحيح!');
                return;
            }

            statusBox.style.display = 'block';
            statusText.innerHTML = `جاري معالجة الرابط عبر سكربت <b>downloader.py</b>...`;

            // محاكاة الاتصال الناجح وتجهيز الرابط للاستلام
            setTimeout(() => {
                statusText.innerHTML = `✅ تمت الإستجابة بنجاح! الرابط جاهز للتحميل عبر سيرفرك.`;
            }, 2000);
        }
    </script>
</body>
</html>
